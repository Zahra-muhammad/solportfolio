<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <link rel="stylesheet" href="css/works.css">
</head>
<body>

  <!-- Noise overlay -->
  <canvas id="noiseCanvas"></canvas>

  <!-- Cursors -->
  <div class="cursor-dot" id="cursorDot"></div>
  <div id="scrollCursor">Scroll</div>
  <div class="cursor-scroll-ring" id="cursorScrollRing">
    <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <path id="circlePath" d="M 36,36 m -26,0 a 26,26 0 1,1 52,0 a 26,26 0 1,1 -52,0"/>
      </defs>
      <circle cx="36" cy="36" r="28" stroke="rgba(240,237,232,0.18)" stroke-width="0.75"/>
      <circle class="ring-dot" cx="36" cy="10" r="2"/>
      <text>
        <textPath class="ring-text" href="#circlePath" startOffset="0%">
          SCROLL · SCROLL · SCROLL · SCROLL ·
        </textPath>
      </text>
    </svg>
  </div>

  <!-- Intro -->
  <div class="intro-overlay" id="introOverlay">
    <div class="intro-text" id="introText">The Work</div>
  </div>

  <!-- Edge fades -->
  <div class="edge-fade-top"></div>
  <div class="edge-fade-bottom"></div>

  <!-- Grid header -->
  <header id="gridHeader">
    <div class="header-left">
      <a href="index.html" style="cursor:none;">
        <span class="back-arrow">&#8592;</span>Back to Home
      </a>
    </div>
    <div class="header-right">
      <div id="counterWrap">
        <div class="counter-main" id="counterMain">001</div>
      </div>
      <div class="counter-sub">003</div>
    </div>
  </header>

  <!-- Category Nav — Websites / Sketches / Other -->
  <nav id="categoryNav">
    <div class="cat-item active" data-category="websites">
      <div class="cat-tick"></div>
      <div class="cat-label">Websites</div>
    </div>
    <div class="cat-item" data-category="sketches">
      <div class="cat-tick"></div>
      <div class="cat-label">Sketches</div>
    </div>
    <div class="cat-item" data-category="other">
      <div class="cat-tick"></div>
      <div class="cat-label">Other</div>
    </div>
  </nav>

  <!-- Nav arrows -->
  <div id="navArrows">
    <div class="nav-arrow" id="arrowUp">
      <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
    </div>
    <div class="nav-arrow" id="arrowDown">
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </div>

  <!-- Fullscreen header -->
  <div id="fullHeader">
    <button class="full-btn" id="btnGrid">&#8592; Grid</button>
    <div id="fullTitle">Project I</div>
    <button class="full-btn" id="btnInfo">Info</button>
  </div>

  <!-- Gallery -->
  <div class="gallery-wrapper">
    <div class="gallery-track" id="galleryTrack"></div>
  </div>

  <!-- Progress bar -->
  <div class="progress-bar" id="progressBar"></div>

  <!-- Zoom clone -->
  <div id="zoomClone"><div id="zoomCloneInner"></div></div>

  <!-- Category flash label -->
  <div id="catFlash"></div>

  <!-- Fullscreen view -->
  <div id="fullscreen">
    <div id="fullBg"></div>
    <div id="colorTint"></div>
    <div id="videoProgress">
      <div id="videoProgressFill"></div>
    </div>
    <div id="fullMeta">
      <div class="proj-num" id="fsNum">001 / 003</div>
      <div class="proj-name" id="fsName">Project I</div>
    </div>
    <div id="scrollHint">
      <div class="scroll-line"></div>
      <span>Tap for sound</span>
    </div>

    <!-- Image title — top center, image mode only -->
    <div id="imgTitle"></div>

    <!-- Zoom controls -->
    <div id="zoomControls">
      <button class="zoom-btn" id="zoomInBtn" title="Zoom in">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="15.65" y2="15.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <button class="zoom-btn" id="zoomOutBtn" title="Zoom out">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="15.65" y2="15.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
    </div>
  </div>

  <!-- Info panel -->
  <div id="infoPanel">
    <button id="infoPanelClose">&#10005; Close</button>
    <span class="info-index" id="infoIndex">001 / 003</span>
    <div class="info-title" id="infoTitle">Project I</div>
    <div class="info-divider"></div>
    <p class="info-desc" id="infoDesc"></p>
    <div class="info-tags" id="infoTags"></div>

    <!-- Links section -->
    <div class="info-links-wrap" id="infoLinksWrap">
      <div class="info-links-label">Links</div>
      <div class="info-links" id="infoLinks"></div>
    </div>

    <div class="info-meta-grid">
      <div class="info-meta-item">
        <div class="meta-label">Year</div>
        <div class="meta-val" id="infoYear"></div>
      </div>
      <div class="info-meta-item">
        <div class="meta-label">Client</div>
        <div class="meta-val" id="infoClient"></div>
      </div>
      <div class="info-meta-item">
        <div class="meta-label">Category</div>
        <div class="meta-val" id="infoCategory"></div>
      </div>
      <div class="info-meta-item">
        <div class="meta-label">Duration</div>
        <div class="meta-val" id="infoDuration"></div>
      </div>
    </div>
  </div>

  <script src="js/works.js"></script>
</body>
</html>
