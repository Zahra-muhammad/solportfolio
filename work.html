<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <link rel="stylesheet" href="css/works.css">
</head>
<body>
  <canvas id="noiseCanvas"></canvas>
  <div class="cursor-dot" id="cursorDot"></div>

  <div class="intro-overlay" id="introOverlay">
    <div class="intro-text" id="introText">The Work</div>
  </div>

  <div class="edge-fade-top"></div>
  <div class="edge-fade-bottom"></div>

  <header id="gridHeader">
    <div class="header-left"><a href="index.html"><span class="back-arrow">&#8592;</span> Back to Artboard</a></div>
    <div class="header-center">
      <div id="counterWrap"><div class="counter-main" id="counterMain">001</div></div>
      <div class="counter-sub">006</div>
    </div>
    <div class="header-right">List</div>
  </header>

  <div id="navArrows">
    <div class="nav-arrow" id="arrowUp"><svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg></div>
    <div class="nav-arrow" id="arrowDown"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
  </div>

  <div id="fullHeader">
    <button class="full-btn" id="btnGrid">&#8592; Grid</button>
    <div id="fullTitle">Project I</div>
    <button class="full-btn" id="btnInfo">Info</button>
  </div>

  <div class="gallery-wrapper">
    <div class="gallery-track" id="galleryTrack"></div>
  </div>

  <div class="progress-bar" id="progressBar"></div>
  <div id="zoomClone"><div id="zoomCloneInner"></div></div>

  <div id="fullscreen">
    <div id="fullBg"></div>
    <div id="fullMeta">
      <div class="proj-num" id="fsNum">001 / 006</div>
      <div class="proj-name" id="fsName">Project I</div>
    </div>
  </div>

  <div id="infoPanel">
    <button id="infoPanelClose">&#10005; Close</button>
    <span class="info-index" id="infoIndex">001 / 006</span>
    <div class="info-title" id="infoTitle">Project I</div>
    <div class="info-divider"></div>
    <p class="info-desc" id="infoDesc"></p>
    <div class="info-tags" id="infoTags"></div>
    <div class="info-meta-grid">
      <div class="info-meta-item"><div class="meta-label">Year</div><div class="meta-val" id="infoYear"></div></div>
      <div class="info-meta-item"><div class="meta-label">Client</div><div class="meta-val" id="infoClient"></div></div>
      <div class="info-meta-item"><div class="meta-label">Category</div><div class="meta-val" id="infoCategory"></div></div>
      <div class="info-meta-item"><div class="meta-label">Duration</div><div class="meta-val" id="infoDuration"></div></div>
    </div>
  </div>

  <script src="js/works.js"></script>
</body>
</html>
